server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml font/woff2;

    # ── security headers ─────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── AI backend: proxy /api/* to the internal FastAPI service ──────────
    # Runtime DNS resolution (docker embedded resolver) so Nginx still starts
    # if ai-api is briefly down, and picks it up again when it restarts.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $upstream ai-api:8000;
        proxy_pass http://$upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Pass Cloudflare's real-visitor IP through for rate limiting.
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_read_timeout 60s;
    }

    # ── hashed static assets: cache hard ─────────────────────────────────
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── everything else: static files, fall back to index ────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
